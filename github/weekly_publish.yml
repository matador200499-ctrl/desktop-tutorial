name: Weekly Video Publisher
on:
  schedule:
    # يتم التشغيل كل يوم أحد في منتصف الليل (00:00 UTC)
    - cron: '0 0 * * 0'
  workflow_dispatch:
    inputs:
      topic:
        description: 'موضوع الفيديو (اختياري، سيتم اختياره تلقائياً إذا لم يتم تحديده)'
        required: false
        default: ''
env:
  PYTHONUNBUFFERED: "1"
  PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
  YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
  YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
  YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
  GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg
        pip install --upgrade pip
        pip install -r requirements.txt

    - name: Pick Video Topic
      id: pick_topic_step
      run: |
        if [ -n "${{ github.event.inputs.topic }}" ]; then
          echo "VIDEO_TOPIC=${{ github.event.inputs.topic }}" >> $GITHUB_ENV
        else
          python scripts/pick_topic.py
        fi

    - name: Generate Script
      run: python scripts/generate_long_script.py

    - name: Generate Voiceover
      run: python scripts/generate_voice.py

    - name: Fetch Video Clips
      run: python scripts/fetch_high_quality_clips.py

    - name: Download Arabic Font
      run: |
        mkdir -p Noto-Naskh
        curl -L -o "Noto-Naskh/NotoNaskh-Regular.ttf" "https://raw.githubusercontent.com/jenskutilek/free-fonts/master/Noto/Noto%20Naskh%20Arabic/TTF/NotoNaskhArabic-Regular.ttf"

    - name: Assemble Video
      run: python scripts/assemble_long_video.py

    - name: Upload Video to YouTube
      run: python scripts/upload_youtube.py
      env:
        VIDEO_PATH: final_video.mp4
        PRIVACY_STATUS: private # يمكن تغييرها إلى public بعد المراجعة

    - name: Upload Artifacts (Optional)
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: video-artifacts
        path: |
          final_video.mp4
          script.json
          content.json
          audio/
          clips/
        if-no-files-found: ignore
