import json
import os
import requests

PEXELS_API_KEY = os.getenv("PEXELS_API_KEY")

def fetch_clips(script_file="script.json", clips_dir="clips"):
    if not os.path.exists(clips_dir):
        os.makedirs(clips_dir)

    with open(script_file, "r", encoding="utf-8") as f:
        script_data = json.load(f)

    scenes = script_data.get("scenes", [])
    headers = {"Authorization": PEXELS_API_KEY}

    for i, scene in enumerate(scenes):
        scene_id = scene.get("id", i + 1)
        visual_suggestions = scene.get("visual_suggestions", "")
        
        # إصلاح الخطأ: التأكد من تحويل القائمة إلى نص إذا لزم الأمر
        if isinstance(visual_suggestions, list):
            query = visual_suggestions[0] if visual_suggestions else "nature"
        else:
            query = visual_suggestions.split(',')[0].strip() if visual_suggestions else "nature"

        print(f"Searching for clip: {query}...")
        url = f"https://api.pexels.com/videos/search?query={query}&per_page=1&orientation=landscape"
        
        try:
            response = requests.get(url, headers=headers )
            data = response.json()
            if data.get("videos"):
                video_url = data["videos"][0]["video_files"][0]["link"]
                video_data = requests.get(video_url).content
                clip_path = os.path.join(clips_dir, f"scene_{scene_id}.mp4")
                with open(clip_path, "wb") as f:
                    f.write(video_data)
                scene["clip_path"] = clip_path
                print(f"  Clip saved for scene {scene_id}")
            else:
                print(f"  No video found for: {query}")
        except Exception as e:
            print(f"  Error fetching clip: {e}")

    with open(script_file, "w", encoding="utf-8") as f:
        json.dump(script_data, f, ensure_ascii=False, indent=4)

if __name__ == "__main__":
    fetch_clips()
