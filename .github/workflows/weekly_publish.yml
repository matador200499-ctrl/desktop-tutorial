name: Weekly Video Publisher

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:
    inputs:
      topic:
        description: 'موضوع الفيديو'
        required: false
        default: ''

env:
  PYTHONUNBUFFERED: "1"
  PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
  YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
  YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
  YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
  GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg fonts-noto fonts-noto-cjk fonts-hosny-amiri
        pip install -r requirements.txt

    - name: Pick Video Topic
      run: |
        if [ -n "${{ github.event.inputs.topic }}" ]; then
          echo "VIDEO_TOPIC=${{ github.event.inputs.topic }}" >> $GITHUB_ENV
        else
          python pick_topic.py
        fi

    - name: Generate Script
      run: python scripts/generate_long_script.py

    - name: Generate Voiceover
      run: python scripts/generate_voice.py

    - name: Fetch Video Clips
      run: python scripts/fetch_high_quality_clips.py

    - name: Assemble Video
      run: python scripts/assemble_long_video.py

    - name: Upload Video to YouTube
      run: python scripts/upload_youtube.py
      env:
        VIDEO_PATH: final_video.mp4
        PRIVACY_STATUS: public

    - name: Commit topic changes
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add topics.txt used_topics.txt
        git commit -m "تحديث قائمة المواضيع" || echo "لا يوجد تغييرات"
        git pull --rebase origin main
        git push
